<input [(ngModel)]="selectedStatus" type="text" class="form-control">
<br>
<ol class="list-group">
    @for (serv of allServers | filter:selectedStatus; track $index) {
        <li class="list-group-item" [ngClass]="affecterClass(serv)">
            {{ serv.name | short:10}} -- {{ serv.type | titlecase}} -- {{ serv.date_d | date:'fullDate' | uppercase}}
            <span class="badge text-bg-secondary">
                {{ serv.status  }}
            </span>
        </li>
        
    }
</ol>

<button (click)="addServer()" class="btn btn-primary">
    Add Server
</button>
