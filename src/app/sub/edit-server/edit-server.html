<label for="">Server Name</label>
<input [(ngModel)]="serverToEdit.name" type="text" class="form-control" />
<label for="">Server Status</label>
<select [(ngModel)]="serverToEdit.status" name="" id="" class="form-control">
  <option value=""></option>
  <option value="offline">Offline</option>
  <option value="online">Online</option>
</select>

<br />
<button routerLink="/servers" class="btn btn-primary">Back To List</button>
